{% extends 'base/base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3>Add Candidate</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-primary">
                Add Candidate
            </button>

        </form>

    </div>

</div>

{% endblock %}
